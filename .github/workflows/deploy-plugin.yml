name: Deploy Plugin Zip

on:
  workflow_dispatch:
    inputs:
      plugin_dir:
        description: "First-level plugin folder to package"
        required: true
        default: "tri_guess"
        type: choice
        options:
          - tri_guess

permissions:
  contents: read

jobs:
  package:
    name: Package selected plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4

      - name: Validate plugin folder
        id: plugin
        shell: bash
        env:
          INPUT_PLUGIN_DIR: ${{ inputs.plugin_dir }}
        run: |
          set -euo pipefail

          plugin_dir="$INPUT_PLUGIN_DIR"

          case "$plugin_dir" in
            ""|.*|/*|*..*|*/*)
              echo "plugin_dir must be a direct child directory name, for example: tri_guess" >&2
              exit 2
              ;;
          esac

          if [ ! -d "$plugin_dir" ]; then
            echo "Plugin directory not found on selected branch: $plugin_dir" >&2
            echo "Available first-level plugin folders:" >&2
            find . -maxdepth 2 -mindepth 2 \( -name metadata.yaml -o -name metadata.yml \) \
              -printf '%h\n' | sed 's#^\./##' | sort >&2
            exit 1
          fi

          if [ ! -f "$plugin_dir/metadata.yaml" ] && [ ! -f "$plugin_dir/metadata.yml" ]; then
            echo "$plugin_dir does not contain metadata.yaml or metadata.yml" >&2
            exit 1
          fi

          echo "plugin_dir=$plugin_dir" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$plugin_dir" >> "$GITHUB_OUTPUT"
          echo "artifact_path=dist/$plugin_dir" >> "$GITHUB_OUTPUT"

      - name: Stage plugin artifact root
        shell: bash
        env:
          PLUGIN_DIR: ${{ steps.plugin.outputs.plugin_dir }}
        run: |
          set -euo pipefail

          artifact_root="$GITHUB_WORKSPACE/dist/$PLUGIN_DIR"
          rm -rf "$artifact_root"
          mkdir -p "$artifact_root"
          cp -R "$PLUGIN_DIR"/. "$artifact_root"/

          find "$artifact_root" -name '.DS_Store' -delete
          find "$artifact_root" -name '*.pyc' -delete
          find "$artifact_root" -type d \( \
            -name '__MACOSX' -o \
            -name '__pycache__' -o \
            -name '.pytest_cache' -o \
            -name 'data' \
          \) -prune -exec rm -rf {} +

          test -f "$artifact_root/metadata.yaml" || test -f "$artifact_root/metadata.yml"

      - name: Upload browser-downloadable plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.plugin.outputs.artifact_name }}
          path: ${{ steps.plugin.outputs.artifact_path }}/**
          if-no-files-found: error

      - name: Write download summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Plugin zip is ready

          Branch packaged: `${{ github.ref_name }}`
          Zip filename: `${{ steps.plugin.outputs.artifact_name }}.zip`

          Download `${{ steps.plugin.outputs.artifact_name }}.zip` from this workflow run's **Artifacts** section in your browser, then upload that file directly to AstrBot.
          EOF
