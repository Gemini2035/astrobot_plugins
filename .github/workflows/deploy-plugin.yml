name: Deploy Plugin Zip

on:
  workflow_dispatch:
    inputs:
      plugin_dir:
        description: "First-level plugin folder to package, for example: tri_guess"
        required: true
        default: "tri_guess"
        type: string
      zip_name:
        description: "Optional output zip filename, for example: tri_guess.zip"
        required: false
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Package plugin from production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: production

      - name: Validate plugin folder
        id: plugin
        shell: bash
        env:
          INPUT_PLUGIN_DIR: ${{ inputs.plugin_dir }}
          INPUT_ZIP_NAME: ${{ inputs.zip_name }}
        run: |
          set -euo pipefail

          plugin_dir="$INPUT_PLUGIN_DIR"
          zip_name="$INPUT_ZIP_NAME"

          case "$plugin_dir" in
            ""|.*|/*|*..*|*/*)
              echo "plugin_dir must be a direct child directory name, for example: tri_guess" >&2
              exit 2
              ;;
          esac

          if [ ! -d "$plugin_dir" ]; then
            echo "Plugin directory not found on production branch: $plugin_dir" >&2
            echo "Available first-level plugin folders:" >&2
            find . -maxdepth 2 -mindepth 2 \( -name metadata.yaml -o -name metadata.yml \) \
              -printf '%h\n' | sed 's#^\./##' | sort >&2
            exit 1
          fi

          if [ ! -f "$plugin_dir/metadata.yaml" ] && [ ! -f "$plugin_dir/metadata.yml" ]; then
            echo "$plugin_dir does not contain metadata.yaml or metadata.yml" >&2
            exit 1
          fi

          if [ -z "$zip_name" ]; then
            zip_name="${plugin_dir}.zip"
          fi

          case "$zip_name" in
            ""|.*|/*|*..*|*/*|*.zip.zip)
              echo "zip_name must be a plain filename ending in .zip, for example: ${plugin_dir}.zip" >&2
              exit 2
              ;;
            *.zip)
              ;;
            *)
              zip_name="${zip_name}.zip"
              ;;
          esac

          echo "plugin_dir=$plugin_dir" >> "$GITHUB_OUTPUT"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${plugin_dir}-zip" >> "$GITHUB_OUTPUT"

      - name: Package zip
        shell: bash
        env:
          PLUGIN_DIR: ${{ steps.plugin.outputs.plugin_dir }}
          ZIP_NAME: ${{ steps.plugin.outputs.zip_name }}
        run: |
          set -euo pipefail
          ./package_plugin.sh "$PLUGIN_DIR" "dist/$ZIP_NAME"

      - name: Upload browser-downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.plugin.outputs.artifact_name }}
          path: dist/${{ steps.plugin.outputs.zip_name }}
          if-no-files-found: error

      - name: Write download summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Plugin zip is ready

          Branch packaged: `production`

          Download it from this workflow run's **Artifacts** section in your browser.
          EOF
